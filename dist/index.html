<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>NBSS Football CCA</title>
    <meta name="description" content="Naval Base Secondary School Football CCA — Training, Nutrition, Mindset, Fitness and Progress Tracking for student athletes." />

    <!-- Theme colour -->
    <meta name="theme-color" content="#050f1e" />
    <meta name="msapplication-TileColor" content="#050f1e" />

    <!-- PWA manifest (must be at root — served from /public in Vite) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />

    <!--
      Apple home screen icons.
      iOS Safari ignores the web manifest entirely for home screen icons.
      It ONLY reads <link rel="apple-touch-icon">.
      The icon must be a flat square PNG — iOS applies its own rounded mask.
      Providing both 180 and 192 ensures coverage across all iOS versions.
    -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- iOS PWA display settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NBSS FC" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NBSS Football CCA" />
    <meta property="og:description" content="Naval Base Secondary School Football CCA — Train. Grow. Compete. Together." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <script type="module" crossorigin src="/assets/index-DcPsCsu0.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
