<!DOCTYPE html>

    <!-- ── FONTS ── -->
    <!-- Preconnect reduces latency on first font request -->

    <!--
      Bebas Neue       — display / hero numbers (condensed athletic)
      Instrument Sans  — body text (premium humanist sans, replaces DM Sans)
      DM Sans          — body fallback
      Playfair Display — editorial serif for insight / coaching guidance moments
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />

    <!-- ── GLOBAL RENDERING BASELINE ── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html {
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Enable kerning, ligatures, and contextual alternates across all text */
        font-feature-settings: "kern" 1, "liga" 1, "calt" 1;
      }
      body { margin: 0; }
    </style>
    <script type="module" crossorigin src="/assets/index-QUwKDyS-.js"></script>

  <body>
    <div id="root">
      <!-- Pre-React loading state — React replaces this when it mounts -->
      <div style="min-height:100vh;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;">
        <style>@keyframes gp-spin{to{transform:rotate(360deg)}}</style>
        <div style="width:36px;height:36px;border:2px solid #222;border-top-color:#fff;border-radius:50%;animation:gp-spin 0.75s linear infinite;"></div>
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:#444;letter-spacing:0.12em;text-transform:uppercase;">Loading GamePlan…</div>
      </div>
    </div>
